		}

			/* margin: 0; */
			/* padding: 0; */
			width: 100%;
			height: 35px;
		}

		.ui-menu .ui-menu-item a {
			text-decoration: none;
			display: block;
			padding: 6px 0.4em;
			line-height: 1.5;
			min-height: 0;
			font-weight: normal;
			height: 35px;
			background: white;

			/* text-decoration: none!important; */
			background: #3a9ef7;
			color: white;
		}

			background: #3a9ef7 !important;
			font-weight: normal;
			color: #ffffff !important;
		}

		.expandable {
			max-width: 100px;
			/* Set your desired max width for truncated text */
			max-height: 100px;
			/* Set your desired max height for truncated text */
			overflow: hidden;
			white-space: nowrap;
			position: relative;
			text-overflow: ellipsis;
			cursor: pointer;
		}

		.expandable:hover {
			display: inline-block;
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 10px;
			text-size-adjust: initial;
			content-visibility: initial;
			direction: ltr;
			position: relative;
			padding: 10px;
			border: 1px solid rgb(255, 255, 255);
			max-width: 150px;
			max-height: 100px;
			/* Remove max-height on hover */
			white-space: wrap;
			/* Allow text to wrap */
			overflow-y: scroll;
			/* Add scrollbar */
			overflow-x: scroll;
			/* overflow: visible; Display full content on hover */
			z-index: 1;
			/* Ensure the expanded content displays above other elements */
		}

		.expandtext {
			display: inline-block;
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 10px;
			text-size-adjust: initial;
			content-visibility: initial;
			direction: ltr;
			position: relative;
			padding: 10px;
			border: 1px solid rgb(255, 255, 255);
			max-width: 500px;
			max-height: 100px;
			/* Remove max-height on hover */
			white-space: wrap;
			/* Allow text to wrap */
			overflow-y: scroll;
			/* Add scrollbar */
			overflow-x: scroll;
			/* overflow: visible; Display full content on hover */
			z-index: 1;
			/* Ensure the expanded content displays above other elements */
		}

		.aside .aside-logo .logo-minimize {
			display: none
		}
	</style>
