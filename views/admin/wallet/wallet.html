<%- include('../common/header.html')-%>
<style>
/* Make table scroll properly on small devices */
.table-responsive {
    width: 100%;
    overflow-x: auto;
}

/* Prevent table content breaking layout */
.table th,
.table td {
    white-space: nowrap;
    vertical-align: middle;
}

/* Better mobile padding */
@media (max-width: 768px) {
    .card-body {
        padding: 15px !important;
    }

    .toolbar .page-title {
        flex-direction: column;
        align-items: flex-start !important;
    }

    .toolbar .breadcrumb {
        margin-top: 5px;
    }

    .position-relative.w-md-400px {
        width: 100% !important;
    }

    .d-flex.align-items-center {
        flex-direction: column;
        align-items: stretch !important;
    }

    .btn-primary.me-5 {
        margin-top: 10px !important;
        margin-right: 0 !important;
        width: 100%;
    }

	.w-md-400px {
        width: 100% !important;
    }
}

/* Modal responsive fix */
@media (max-width: 576px) {
    .modal-dialog {
        margin: 10px !important;
    }

    .modal-content {
        padding: 10px;
    }

    .input-group button {
        min-width: 70px;
    }
}
</style>
<div class="content d-flex flex-column flex-column-fluid" id="kt_content">
	<div class="toolbar" id="kt_toolbar">
		<div id="kt_toolbar_container" class="container-fluid d-flex flex-stack">
			<div class="d-flex align-items-center py-1">
				<a href="javascript:;" onclick="add_record();" class="btn btn-sm btn-primary">Add New</a>
			</div>
			<div class="d-flex align-items-center">
				<!--begin::Input group-->
				<div class="position-relative w-md-400px me-md-2">
					<!--begin::Svg Icon | path: icons/duotune/general/gen021.svg-->
					<span class="svg-icon svg-icon-3 svg-icon-gray-500 position-absolute top-50 translate-middle ms-6">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
							<rect opacity="0.5" x="17.0365" y="15.1223" width="8.15546" height="2" rx="1" transform="rotate(45 17.0365 15.1223)" fill="black"></rect>
							<path d="M11 19C6.55556 19 3 15.4444 3 11C3 6.55556 6.55556 3 11 3C15.4444 3 19 6.55556 19 11C19 15.4444 15.4444 19 11 19ZM11 5C7.53333 5 5 7.53333 5 11C5 14.4667 7.53333 17 11 17C14.4667 17 17 14.4667 17 11C17 7.53333 14.4667 5 11 5Z" fill="black"></path>
						</svg>
					</span>
					<!--end::Svg Icon-->
					<input type="text" class="form-control form-control-solid ps-10" id="search" name="search" value="" placeholder="Search">
				</div>
				<!--end::Input group-->
				<!--begin:Action-->
				<div class="d-flex align-items-center">
					<button type="button" onclick="pagination(1);" class="btn btn-primary me-5">Search</button>
				</div>
				<!--end:Action-->
			</div>
		</div>
	</div>
	<div class="post d-flex flex-column-fluid" id="kt_post">
		<div id="kt_content_container" class="container-xxl">
			<div class="row g-5 g-xl-8">
				<div class="col-xl-12">
					<div class="card card-xl-stretch mb-xl-8">
						<div class="card-header border-0 pt-5">
							<h3 class="card-title align-items-start flex-column">
								<span class="card-label fw-bolder text-dark"><%= title %></span>
							</h3>
						</div>
						<div class="card-body pt-5">
							<div class="table-responsive">
								<table class="table table-row-dashed table-row-gray-300 align-middle gs-0 gy-4">
									<thead>
										<tr class="fw-bolder text-muted">
											<th class="min-w-150px">Selected Network</th>
											<th class="min-w-150px">Current Wallet</th>
											<th class="min-w-100px">Date</th>
											<th class="min-w-100px">Actions</th>
										</tr>
									</thead>
									<tbody class="table-data">
										<tr>
											<td colspan="4">
												<span class="fw-bold d-block fs-7">Loading...</span>
											</td>
										</tr>
									</tbody>
								</table>
							</div>
							<div class="d-flex flex-stack flex-wrap pt-10">
								<div class="fs-6 fw-bold text-gray-700 pagination-text"></div>
								<ul class="pagination" id="pagination"></ul>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>

<div class="modal fade" id="edit-modal" tabindex="-1" aria-hidden="true">
	<div class="modal-dialog modal-dialog-centered mw-650px">
		<div class="modal-content rounded">
			<div class="modal-header">
				<h2 class="popup-title">Add / Edit <%= title %></h2>
				<div class="btn btn-sm btn-icon btn-active-color-primary" data-bs-dismiss="modal">
					<span class="svg-icon svg-icon-1">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
							<rect opacity="0.5" x="6" y="17.3137" width="16" height="2" rx="1" transform="rotate(-45 6 17.3137)" fill="black" />
							<rect x="7.41422" y="6" width="16" height="2" rx="1" transform="rotate(45 7.41422 6)" fill="black" />
						</svg>
					</span>
				</div>
			</div>
			<div class="modal-body scroll-y px-10 px-lg-15 pt-0 pb-10">
				<form id="edit_users" class="form" action="#">
                    <input type="hidden" id="record_id" name="id" />
					<div class="mb-4 text-center">
					</div>
					<!-- Selected Network -->
                    <div class="row g-9 mb-5">
                        <div class="col-md-12 fv-row">
                            <label class="required fs-6 fw-bold mb-2">Selected Network</label>
                            <input type="text" class="form-control form-control-solid"
                                name="selected_network" id="selected_network" placeholder="Enter Selected Network" required />
                        </div>
                    </div>

                    <!-- Current Wallet -->
                    <div class="row g-9 mb-5">
                        <div class="col-md-12 fv-row">
                            <label class="required fs-6 fw-bold mb-2">Current Wallet</label>
                            <input type="text" class="form-control form-control-solid"
                                name="current_wallet" id="current_wallet" placeholder="Enter Current Wallet" required />
                        </div>
                    </div>

					<div class="text-center">
						<button type="submit" id="kt_modal_new_target_submit" class="btn btn-primary">
							<span class="indicator-label">Submit</span>
							<span class="indicator-progress">
							<span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
						</button>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
<%- include('../common/footer.html')-%>
