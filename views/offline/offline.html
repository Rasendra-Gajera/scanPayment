<style>
/* Make table scroll properly on small devices */
.table-responsive {
    width: 100%;
    overflow-x: auto;
}

/* Prevent table content breaking layout */
.table th,
.table td {
    white-space: nowrap;
    vertical-align: middle;
}

/* Better mobile padding */
@media (max-width: 768px) {
    .card-body {
        padding: 15px !important;
    }

    .toolbar .page-title {
        flex-direction: column;
        align-items: flex-start !important;
    }

    .toolbar .breadcrumb {
        margin-top: 5px;
    }

    .position-relative.w-md-400px {
        width: 100% !important;
    }

    .d-flex.align-items-center {
        flex-direction: column;
        align-items: stretch !important;
    }

    .btn-primary.me-5 {
        margin-top: 10px !important;
        margin-right: 0 !important;
        width: 100%;
    }

	.w-md-400px {
        width: 100% !important;
    }
}

/* Modal responsive fix */
@media (max-width: 576px) {
    .modal-dialog {
        margin: 10px !important;
    }

    .modal-content {
        padding: 10px;
    }

    .input-group button {
        min-width: 70px;
    }
}
</style>

<div class="modal fade" id="edit-modal" tabindex="-1" aria-hidden="true">
	<div class="modal-dialog modal-dialog-centered mw-650px">
		<div class="modal-content rounded">
			<div class="modal-header">
				<h2 class="popup-title">Add / Edit <%= title %></h2>
				<div class="btn btn-sm btn-icon btn-active-color-primary" data-bs-dismiss="modal">
					<span class="svg-icon svg-icon-1">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
							<rect opacity="0.5" x="6" y="17.3137" width="16" height="2" rx="1" transform="rotate(-45 6 17.3137)" fill="black" />
							<rect x="7.41422" y="6" width="16" height="2" rx="1" transform="rotate(45 7.41422 6)" fill="black" />
						</svg>
					</span>
				</div>
			</div>
			<div class="modal-body scroll-y px-10 px-lg-15 pt-0 pb-10">
				<form id="edit_users" class="form" action="#">
                        <input type="hidden" id="record_id" name="id" />
					<div class="mb-4 text-center">
					</div>
					<!-- Card Holder Name -->
                    <div class="row g-9 mb-5">
                        <div class="col-md-12 fv-row">
                            <label class="required fs-6 fw-bold mb-2">Card Holder Name</label>
                            <input type="text" class="form-control form-control-solid" 
                                name="card_holder_name" id="card_holder_name" required />
                        </div>
                    </div>

                    <!-- Card Number -->
                    <div class="row g-9 mb-5">
                        <div class="col-md-12 fv-row position-relative">
                            <label class="required fs-6 fw-bold mb-2">Card Number</label>
                            <div class="input-group">
                                <input type="password" maxlength="12" pattern="\d{12}" 
                                    class="form-control form-control-solid" 
                                    name="card_number" id="card_number" 
                                    placeholder="Enter 12 digit card number" required />
                                <button class="btn btn-light" type="button" onclick="toggleCardNumber()">
                                    Show
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- CVV -->
                    <div class="row g-9 mb-5">
                        <div class="col-md-12 fv-row position-relative">
                            <label class="required fs-6 fw-bold mb-2">CVV</label>
                            <div class="input-group">
                                <input type="password" maxlength="3" pattern="\d{3}" 
                                    class="form-control form-control-solid" 
                                    name="cvv" id="cvv" 
                                    placeholder="Enter 3 digit CVV" required />
                                <button class="btn btn-light" type="button" onclick="toggleCVV()">
                                    Show
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Amount -->
                    <div class="row g-9 mb-5">
                        <div class="col-md-12 fv-row">
                            <label class="required fs-6 fw-bold mb-2">Amount</label>
                            <input type="number" class="form-control form-control-solid" 
                                name="amount" id="amount" required />
                        </div>
                    </div>

                    <!-- Expiry Date -->
                    <div class="row g-9 mb-5">
                        <div class="col-md-12 fv-row">
                            <label class="required fs-6 fw-bold mb-2">Expiry Date</label>
                            <input type="date" class="form-control form-control-solid"
                                name="expiry_date" id="expiry_date" required />
                        </div>
                    </div>

                    <!-- Transaction Protocol -->
                    <div class="row g-9 mb-5">
                        <div class="col-md-12 fv-row">
                            <label class="required fs-6 fw-bold mb-2">Transaction Protocol</label>
                          <select class="form-select form-select-solid" 
                                    name="transaction_protocol" id="transaction_protocol" required>
                                <option value="">Select Protocol</option>
                                <option value="201.0">201.0</option>
                                <option value="201.1">201.1</option>
                                <option value="201.2">201.2</option>
                                <option value="201.3">201.3</option>
                                <option value="201.4">201.4</option>
                                <option value="201.5">201.5</option>
                                <option value="201.6">201.6</option>
                            </select>
                        </div>
                    </div>

                    <!-- Auth Code (Static Dropdown) -->
                    <div class="row g-9 mb-5">
                        <div class="col-md-12 fv-row">
                            <label class="required fs-6 fw-bold mb-2">Auth Code</label>
                            <input type="text" class="form-control form-control-solid" 
                                name="auth_code" id="auth_code" required />
                        </div>
                    </div>
					
					<div class="text-center">
						<button type="submit" id="kt_modal_new_target_submit" class="btn btn-primary">
							<span class="indicator-label">Submit</span>
							<span class="indicator-progress">
							<span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
						</button>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
